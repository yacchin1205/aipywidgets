name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set release version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          IFS=. read -r YEAR MONTH PATCH <<< "$TAG_VERSION"
          NPM_VERSION="${YEAR}.$((10#${MONTH})).${PATCH}"
          echo "RELEASE_VERSION=$NPM_VERSION" >> "$GITHUB_ENV"
          npm version --no-git-tag-version "$NPM_VERSION"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Python distributions
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ env.RELEASE_VERSION }}
        run: |
          python -m pip install --upgrade pip build jupyterlab
          python -m build

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/* --generate-notes
          fi
